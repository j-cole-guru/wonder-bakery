<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- White background circle (matching their logo) -->
  <circle cx="50" cy="50" r="50" fill="#ffffff"/>

  <!-- Outer orange ring arc top -->
  <path d="M15 50 A35 35 0 0 1 85 50" fill="none" stroke="#E87722" stroke-width="3"/>

  <!-- Wheat stalk left -->
  <line x1="20" y1="72" x2="26" y2="38" stroke="#E87722" stroke-width="2"/>
  <ellipse cx="23" cy="65" rx="4" ry="7" fill="#E87722" transform="rotate(-25 23 65)"/>
  <ellipse cx="21" cy="55" rx="3.5" ry="6" fill="#E87722" transform="rotate(-15 21 55)"/>
  <ellipse cx="22" cy="44" rx="3" ry="5" fill="#E87722" transform="rotate(-10 22 44)"/>

  <!-- Wheat stalk right -->
  <line x1="80" y1="72" x2="74" y2="38" stroke="#E87722" stroke-width="2"/>
  <ellipse cx="77" cy="65" rx="4" ry="7" fill="#E87722" transform="rotate(25 77 65)"/>
  <ellipse cx="79" cy="55" rx="3.5" ry="6" fill="#E87722" transform="rotate(15 79 55)"/>
  <ellipse cx="78" cy="44" rx="3" ry="5" fill="#E87722" transform="rotate(10 78 44)"/>

  <!-- Chef hat body (orange) -->
  <ellipse cx="50" cy="56" rx="22" ry="5" fill="#E87722"/>
  <!-- Hat dome center -->
  <ellipse cx="50" cy="42" rx="11" ry="15" fill="#E87722"/>
  <!-- Hat dome left puff -->
  <ellipse cx="37" cy="48" rx="9" ry="12" fill="#E87722"/>
  <!-- Hat dome right puff -->
  <ellipse cx="63" cy="48" rx="9" ry="12" fill="#E87722"/>
  <!-- Hat white band -->
  <rect x="29" y="53" width="42" height="5" rx="2.5" fill="rgba(255,255,255,0.35)"/>

  <!-- Brown ribbon banner -->
  <path d="M24 68 Q50 62 76 68 L72 78 Q50 72 28 78 Z" fill="#5C3317"/>
  <!-- Banner notch left -->
  <polygon points="24,68 20,73 24,78 28,78" fill="#5C3317"/>
  <!-- Banner notch right -->
  <polygon points="76,68 80,73 76,78 72,78" fill="#5C3317"/>

  <!-- BAKERY text on banner -->
  <text x="50" y="76" text-anchor="middle" font-family="Arial Black, sans-serif" font-weight="900" font-size="7.5" fill="#ffffff" letter-spacing="2">BAKERY</text>

  <!-- WONDER text above hat -->
  <text x="50" y="28" text-anchor="middle" font-family="Arial Black, sans-serif" font-weight="900" font-size="9" fill="#5C3317" letter-spacing="3">WONDER</text>
</svg>
